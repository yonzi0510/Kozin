<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; width:100%; }
  body {
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
    background:linear-gradient(160deg,#4A6CF7,#6A5AE0);
    display:flex; align-items:center; justify-content:center;
    overflow-x:hidden;
  }
  .box { text-align:center; padding:0 28px; width:100%; max-width:340px; }
  .app-icon { width:84px; height:84px; border-radius:21px; box-shadow:0 8px 24px rgba(20,25,60,.35); }
  h1 { color:#fff; font-size:20px; margin:14px 0 4px; }
  .sub { color:rgba(255,255,255,.75); font-size:13px; margin-bottom:24px; }
  .pin-wrap { display:block; }
  #pin {
    display:block; width:100%; min-width:0; padding:14px; margin-bottom:10px;
    border:none; border-radius:14px; outline:none;
    font-size:22px; text-align:center; letter-spacing:8px; font-family:inherit;
    background:rgba(255,255,255,.95);
  }
  #goBtn {
    display:block; width:100%; min-width:0; padding:14px;
    border:none; border-radius:14px;
    background:#2B3044; color:#fff; font-size:16px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }
  .msg { color:#FFD9D9; font-size:13.5px; margin-top:14px; min-height:20px; font-weight:600; }
  .shake { animation:shake .35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .loading { color:rgba(255,255,255,.85); font-size:14px; margin-top:14px; display:none; }
</style>
</head>

var ITER = 250000;

function b2buf(b64) {
  var bin = atob(b64);
  var u = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
  return u.buffer;
}

async function unlock(pin) {
  var enc = new TextEncoder();
  var km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b2buf(PAYLOAD.salt), iterations:ITER, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  var plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2buf(PAYLOAD.iv) }, key, b2buf(PAYLOAD.ct));
  return new TextDecoder().decode(plain);
}

var busy = false;
async function submitPin(autoPin) {
  if (busy) return;
  var pin = autoPin || document.getElementById('pin').value.trim();
  if (!pin) return;
  busy = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('msg').textContent = '';
  try {
    var html = await unlock(pin);
    /* 설정 탭의 자동로그인 토글이 꺼져 있으면 암호를 저장하지 않음 */
    if (localStorage.getItem('yj_lock_auto') !== 'off') {
      localStorage.setItem('yj_lock_pin', pin);
    } else {
      localStorage.removeItem('yj_lock_pin');
    }
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    busy = false;
    document.getElementById('loading').style.display = 'none';
    if (autoPin) {
      localStorage.removeItem('yj_lock_pin');
    } else {
      var box = document.getElementById('pinWrap');
      box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
      document.getElementById('msg').textContent = '암호가 맞지 않아요';
      document.getElementById('pin').value = '';
      document.getElementById('pin').focus();
    }
  }
}

document.getElementById('pin').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitPin();
});

/* 자동로그인: 저장된 암호로 조용히 시도 */
var saved = localStorage.getItem('yj_lock_pin');
if (saved) { submitPin(saved); }
else { document.getElementById('pin').focus(); }
</script>
