name: Build Windows exe

on:
  push:
    branches:
      - "**"
    paths:
      - "schedule_assistant/**"
      - ".github/workflows/build-windows-exe.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: schedule_assistant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --noconsole --onefile --name ScheduleAssistant main.py

      - uses: actions/upload-artifact@v4
        with:
          name: ScheduleAssistant-windows
          path: schedule_assistant/dist/ScheduleAssistant.exe
